name: smoke

# Real VS Code Extension Host test: installs deps (postinstall downloads the
# release binary into dist/bin), compiles, then activates the extension in a
# headless VS Code and asserts it scans + surfaces a diagnostic. Only passes
# once leakferrethq/leakferret v0.1.0 is public (the postinstall download).
on:
  workflow_dispatch:
  # Uncomment after the release is published:
  # push:
  # pull_request:

jobs:
  extension-host:
    name: extension host (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps + run postinstall (downloads the release binary)
        run: npm install
      - name: Run extension-host tests (Linux needs a virtual display)
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y xvfb
            xvfb-run -a npm test
          else
            npm test
          fi
